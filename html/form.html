<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="../img/favicon.png" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <title>FORM</title>
</head>
<body>
  <div class="wrapper">
    <h1>Welcome</h1>

    <form action="#" method="post">
      <div class="name">
        <label for="firstName">Name</label>
        <input type="text" name="firstName" id="firstName" placeholder="Dima" required>
      </div>
      <div class="email">
        <label for="email">Email</label>
        <input type="email" name="email" id="email" placeholder="example@gmail.com" required>
      </div>
      <div class="tel">
        <label for="phoneNumber">Phone Number</label>
        <input type="tel" name="phoneNumber" id="phoneNumber" placeholder="+375 29 178 0079" required>
      </div>
      <div class="pass">
        <label for="password">Password</label>
        <input type="password" name="password" id="password" required>
      </div>
      <div class="passConfirm">
        <label for="passwordRepeat">Confirm Password</label>
        <input type="password" name="passwordRepeat" id="passwordRepeat" required>
      </div>
      <div class="policy">
        <input type="checkbox" name="rules" id="rules">
        <label for="rules">
          By registering, you agree to the Terms of Service and Privacy Policy, as well as the Cookies Policy.
        </label>
      </div>
      <button type="submit">Create Account</button>
      <div class="alreadyaAccount">
        <span>Already have an account?</span> 
        <a href="#">Log in</a>
      </div>
    </form>
  </div>
  
</body>
</html>
