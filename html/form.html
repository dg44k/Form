<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="../img/favicon.png" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <title>FORM</title>
</head>
<body>
  <div class="intro-img"></div>

  <div class="wrapper">
    <h1 class="title">Welcome <span></span></h1>

    <form action="#" method="post">
      <div class="inputs">
        <input type="text" name="firstName" id="firstName" placeholder="first Name" required>
        <input type="text" name="LastName" id="lastName" placeholder="Last name" required>
        <input type="email" name="email" id="email" placeholder="Email" required>
        <input type="tel" name="phoneNumber" id="phoneNumber" placeholder="Phone Number" required minlength="13">
        <input type="password" name="password" id="password" required placeholder="Password">
        <input type="password" name="passwordRepeat" id="passwordRepeat" placeholder = "Confirn Password" required>
      </div>

      <button type="submit">Create Account</button>
      <div class="alreadyaAccount">
        <span>Already have an account?</span> 
        <a href="#">Log in</a>
      </div>
    </form>

  </div>
  
</body>
</html>
